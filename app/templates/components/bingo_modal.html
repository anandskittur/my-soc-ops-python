<div class="fixed inset-0 flex items-center justify-center p-4 z-50" style="background: rgba(26,10,0,0.75);">
    <div class="animate-float-in max-w-xs w-full text-center ticket p-6">
        <p style="font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: var(--color-accent); letter-spacing: 0.2em; margin-bottom: 1rem;">*** WINNER ***</p>
        <h2 style="font-family: 'Press Start 2P', monospace; font-size: 1.6rem; color: var(--color-primary); line-height: 1.3; margin-bottom: 0.5rem;">BINGO!</h2>
        <p style="font-family: 'VT323', monospace; font-size: 1.4rem; color: var(--color-text-muted); margin-bottom: 1.5rem;">You completed a line!</p>
        <div style="border-top: 2px dashed #c4b89a; margin: 1rem 0;"></div>
        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-gold">
            &gt; KEEP PLAYING
        </button>
    </div>
</div>
